services:
  - type: web
    name: shadowing-ai-sub
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false          # Renderダッシュボードで設定
      - key: DB_PATH
        value: /data/shadowing.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true  # Renderが自動生成
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GENERATION_MODEL
        value: claude-haiku-4-5
      # メール設定（任意）
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

    disk:
      name: shadowing-db
      mountPath: /data
      sizeGB: 1
